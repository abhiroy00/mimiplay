name: Backend CI/CD → EC2 (Docker Compose)

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'backend/**'
      - 'monitoring/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'backend/**'

jobs:
  # ---------------------------------------------------------------------------
  # CI: Python syntax check (fast gate before deploying)
  # ---------------------------------------------------------------------------
  ci:
    name: Python Syntax Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python syntax
        run: |
          python -m py_compile app.py config.py extensions.py mimi_llm_session.py
          echo "Syntax check passed"

  # ---------------------------------------------------------------------------
  # Deploy: SSH into EC2 → git pull → docker-compose up --build
  # Only runs on direct pushes (not PRs)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to EC2 (${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }})
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      # ── Staging: check secrets then deploy ──────────────────────────────
      - name: Check staging deploy secrets
        id: staging_check
        if: github.ref == 'refs/heads/develop'
        env:
          EC2_HOST: ${{ secrets.EC2_HOST_STAGING }}
        run: |
          if [ -z "$EC2_HOST" ]; then
            echo "::warning::EC2_HOST_STAGING not configured — skipping staging deploy"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to staging EC2
        if: github.ref == 'refs/heads/develop' && steps.staging_check.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST_STAGING }}
          username: ${{ secrets.EC2_USER_STAGING }}
          key: ${{ secrets.EC2_SSH_KEY_STAGING }}
          script: |
            set -e

            cd /opt/mimiplay
            git fetch origin
            git reset --hard origin/develop

            cd backend
            docker compose up -d --build --remove-orphans
            docker image prune -f

            echo "Staging deploy complete: $(date)"

      # ── Production: check secrets then deploy ───────────────────────────
      - name: Check production deploy secrets
        id: production_check
        if: github.ref == 'refs/heads/main'
        env:
          EC2_HOST: ${{ secrets.EC2_HOST_PRODUCTION }}
        run: |
          if [ -z "$EC2_HOST" ]; then
            echo "::warning::EC2_HOST_PRODUCTION not configured — skipping production deploy"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to production EC2
        if: github.ref == 'refs/heads/main' && steps.production_check.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST_PRODUCTION }}
          username: ${{ secrets.EC2_USER_PRODUCTION }}
          key: ${{ secrets.EC2_SSH_KEY_PRODUCTION }}
          script: |
            set -e

            cd /opt/mimiplay
            git fetch origin
            git reset --hard origin/main

            cd backend
            docker compose up -d --build --remove-orphans
            docker image prune -f

            echo "Production deploy complete: $(date)"
